name: Live Cyber Threat Pipeline

on:
  schedule:
    - cron: "0 0,12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  live-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run live pipeline
        run: python scripts/run_live_pipeline.py

      - name: Commit live pipeline outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/live/raw/live_items_raw.csv || true
          git add data/live/processed || true
          git add reports/live || true
          git add dashboard/src/data || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update live pipeline outputs [skip ci]"
            git push
          fi
